<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>老師模式 - QuizArena</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/learning_tools.css">
  <link rel="stylesheet" href="css/dark_mode.css">
  <link rel="stylesheet" href="css/teacher_mode.css">
</head>
<body>
  <script>
    document.body.classList.toggle('dark-mode', localStorage.getItem('quizDarkMode') === '1');
  </script>
  <main class="tool-shell teacher-report-page">
    <header class="tool-topbar">
      <a class="tool-back" href="index.html"><i class="fa-solid fa-chevron-left"></i></a>
      <div>
        <p class="tool-kicker teacher-subtitle" data-i18n="Teacher">TEACHER</p>
        <h1 class="teacher-title" data-i18n="老師模式">老師模式</h1>
      </div>
    </header>

    <section class="tool-card report-search">
      <label for="reportPinInput">輸入房間 PIN，或從下方建房紀錄選擇</label>
      <div class="report-search-row">
        <input id="reportPinInput" maxlength="6" inputmode="numeric" placeholder="例如 123456">
        <button id="loadReportBtn" class="tool-btn primary"><i class="fa-solid fa-magnifying-glass-chart"></i> 查看報表</button>
        <button id="downloadCsvBtn" class="tool-btn" disabled><i class="fa-solid fa-file-csv"></i> 匯出 CSV</button>
        <button id="downloadExcelReportBtn" class="tool-btn" disabled><i class="fa-solid fa-file-excel"></i> 匯出 Excel 報表</button>
        <button id="downloadHtmlReportBtn" class="tool-btn" disabled><i class="fa-solid fa-chart-column"></i> 匯出分析報告</button>
      </div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2>建房紀錄</h2>
        <button id="refreshHistoryBtn" class="tool-btn"><i class="fa-solid fa-rotate"></i> 重新整理</button>
      </div>
      <div id="reportHistoryList" class="history-list"></div>
    </section>

    <section class="summary-grid">
      <article><span>房間</span><strong id="reportRoomName">-</strong></article>
      <article><span>學生數</span><strong id="reportPlayerCount">0</strong></article>
      <article><span>題目數</span><strong id="reportQuestionCount">0</strong></article>
      <article><span>平均正確率</span><strong id="reportAverageAccuracy">0%</strong></article>
      <article><span>平均分數</span><strong id="reportAverageScore">0</strong></article>
      <article><span>需關注學生</span><strong id="reportNeedsHelp">0</strong></article>
    </section>

    <section class="tool-card">
      <div class="tool-card-head"><h2>圖表分析</h2></div>
      <div id="reportAnalysisPanel" class="analysis-panel"></div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head"><h2>學生表現</h2></div>
      <div id="studentReportList" class="report-table-wrap"></div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head"><h2>題目答對率</h2></div>
      <div id="questionReportList" class="question-list compact"></div>
    </section>
  </main>

  <!-- ===== Analytics 5-Tab 儀表板 ===== -->
  <link rel="stylesheet" href="css/analytics.css">
  <div style="margin-top:28px;border-top:2px solid rgba(139,92,246,0.3);padding-top:24px;">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;">
      <h2 class="gradient-title" style="font-size:22px;">📊 進階分析儀表板</h2>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
        <label for="analytics-room-select" style="color:#a78bfa;font-size:13px;">房間：</label>
        <select id="analytics-room-select" onchange="analyticsLoadRoom(this.value)"
          style="background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.4);color:#e9d5ff;padding:6px 12px;border-radius:8px;font-size:13px;">
          <option value="">請選擇...</option>
        </select>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTeacherTab('overview',this)">📊 班級總覽</button>
      <button class="tab-btn" onclick="switchTeacherTab('student',this)">👤 個別學生</button>
      <button class="tab-btn" onclick="switchTeacherTab('weak',this)">⚠️ 弱題分析</button>
      <button class="tab-btn" onclick="switchTeacherTab('ai',this)">🤖 AI 建議</button>
      <button class="tab-btn" onclick="switchTeacherTab('parent',this)">📄 家長報告</button>
    </div>

    <div id="tab-overview" class="tab-panel active">
      <div class="stat-grid" id="class-stats-grid" style="margin-bottom:20px;"></div>
      <div class="glass-card" style="margin-bottom:16px;">
        <h3 style="color:#c4b5fd;margin-bottom:12px;">班級正確率分布</h3>
        <canvas id="class-dist-chart" height="80"></canvas>
      </div>
      <h3 style="color:#c4b5fd;margin-bottom:12px;">學生狀態一覽</h3>
      <div id="student-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;"></div>
    </div>

    <div id="tab-student" class="tab-panel">
      <div style="display:flex;gap:16px;flex-wrap:wrap;">
        <div id="student-list-panel" style="width:180px;flex-shrink:0;">
          <h3 style="color:#c4b5fd;font-size:14px;margin-bottom:8px;">學生列表</h3>
          <div id="student-list"></div>
        </div>
        <div id="student-detail-panel" class="glass-card" style="flex:1;min-width:200px;">
          <p style="color:#6d28d9;text-align:center;padding:20px;">點選左側學生查看詳情</p>
        </div>
      </div>
    </div>

    <div id="tab-weak" class="tab-panel">
      <div class="glass-card" style="margin-bottom:16px;">
        <h3 style="color:#c4b5fd;margin-bottom:12px;">各題錯誤率</h3>
        <canvas id="weak-bar-chart" height="120"></canvas>
      </div>
      <div id="weak-detail-list"></div>
    </div>

    <div id="tab-ai" class="tab-panel">
      <p style="color:#a78bfa;margin-bottom:16px;font-size:13px;">
        點擊「生成建議」為各學生產生 AI 個人化學習建議。
      </p>
      <div id="ai-cards-container"></div>
    </div>

    <div id="tab-parent" class="tab-panel">
      <div class="glass-card">
        <h3 style="color:#c4b5fd;margin-bottom:16px;">📄 生成家長報告</h3>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
          <label style="color:#a78bfa;font-size:13px;">選擇學生：</label>
          <select id="parent-student-select"
            style="background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.4);color:#e9d5ff;padding:6px 12px;border-radius:8px;font-size:13px;">
            <option value="">請選擇學生...</option>
          </select>
          <button onclick="generateParentReport()"
            style="background:var(--purple-primary);color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;">
            生成報告
          </button>
        </div>
        <div id="parent-report-result"></div>
      </div>
    </div>
  </div>
  <!-- ===== end Analytics 儀表板 ===== -->

  <div class="toast-qa" id="toast"></div>
  <script src="js/i18n.js"></script>
  <script src="js/teacher_report.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/analytics-teacher.js"></script>
  <script src="js/Audio_manager.js"></script>
  <script src="js/nav_drawer.js"></script>
  <script src="js/music_drawer.js"></script>
  <script>
    (function(){
      if (document.querySelector('.teacher-bg-bubble')) return;
      const bubbles = [
        ['8%','28%','84px','11s'], ['78%','18%','118px','15s'], ['88%','70%','72px','13s'], ['18%','78%','96px','17s']
      ];
      bubbles.forEach(([x,y,s,d]) => {
        const el = document.createElement('span');
        el.className = 'teacher-bg-bubble';
        el.style.setProperty('--x', x); el.style.setProperty('--y', y);
        el.style.setProperty('--s', s); el.style.setProperty('--d', d);
        document.body.appendChild(el);
      });
      for (let i = 0; i < 16; i++) {
        const el = document.createElement('span');
        el.className = 'teacher-sparkle-particle';
        el.style.setProperty('--x', `${8 + Math.random() * 84}%`);
        el.style.setProperty('--y', `${10 + Math.random() * 78}%`);
        el.style.setProperty('--d', `${2.8 + Math.random() * 2.8}s`);
        document.body.appendChild(el);
      }
    })();
  </script>
</body>
</html>
