<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>故事模式 - QuizArena</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/learning_tools.css">
  <link rel="stylesheet" href="css/dark_mode.css">
</head>
<body>
  <script>
    document.body.classList.toggle('dark-mode', localStorage.getItem('quizDarkMode') === '1');
  </script>
  <main class="tool-shell story-shell">
    <header class="tool-topbar">
      <a class="tool-back" href="index.html"><i class="fa-solid fa-chevron-left"></i></a>
      <div>
        <p class="tool-kicker">Story Mode</p>
        <h1>故事模式</h1>
      </div>
      
    </header>

    <section class="tool-card story-hero-card">
      <div>
        <span class="answer-pill" id="storyModePill">單人闖關</span>
        <h2>選一條學習支線，完成越來越難的關卡。</h2>
        <p>不用房主、不用 PIN，答題會保存進度，之後可以繼續挑戰。</p>
      </div>
      <div class="story-progress-card">
        <span>目前玩家</span>
        <strong id="storyUserName">-</strong>
      </div>
    </section>

    <!-- 模式選擇 -->
    <section class="tool-card story-mode-picker-card">
      <div class="tool-card-head">
        <h2>選擇模式</h2>
      </div>
      <div class="story-mode-tabs">
        <button class="story-mode-tab active" data-mode="solo">
          <i class="fa-solid fa-user"></i>
          <strong>單人闖關</strong>
          <span>按自己步調挑戰支線</span>
        </button>
        <button class="story-mode-tab" data-mode="pvp">
          <i class="fa-solid fa-sword"></i>
          <strong>挑戰模式</strong>
          <span>雙人即時對決 20 題</span>
        </button>
        <button class="story-mode-tab" data-mode="coop">
          <i class="fa-solid fa-handshake"></i>
          <strong>合作模式</strong>
          <span>雙人協力，一人送出答案</span>
        </button>
      </div>

      <!-- 雙人模式：連結操作區 -->
      <div id="storyMultiPanel" style="display:none;" class="story-multi-panel">
        <div class="story-link-row">
          <button id="createChallengeBtn" class="tool-btn">
            <i class="fa-solid fa-link"></i> 建立邀請連結
          </button>
          <div class="story-link-divider">或</div>
          <div class="story-paste-row">
            <input id="challengeLinkInput" class="story-link-input" type="text" placeholder="貼上邀請連結後加入" />
            <button id="joinChallengeBtn" class="tool-btn secondary">
              <i class="fa-solid fa-right-to-bracket"></i> 加入
            </button>
          </div>
        </div>
        <div id="storyLinkDisplay" class="story-link-display" style="display:none;">
          <span id="storyLinkText" class="story-link-value"></span>
          <button id="copyLinkBtn" class="tool-btn secondary">
            <i class="fa-solid fa-copy"></i> 複製
          </button>
        </div>
        <p id="storyWaitingMsg" class="story-waiting-msg" style="display:none;">
          <i class="fa-solid fa-spinner fa-spin"></i> 題庫已選定，等待另一位玩家加入...
        </p>
      </div>
    </section>

    <section class="tool-card story-bank-tools-card">
      <div class="tool-card-head">
        <h2>新增故事題庫</h2>
        <span class="tool-note">AI 題庫至少 20 題，上傳題庫至少 5 題</span>
      </div>
      <div class="story-bank-tools">
        <div class="story-tool-panel">
          <label for="aiStoryTopicInput">AI 生成主題</label>
          <div class="story-inline-form">
            <input id="aiStoryTopicInput" class="story-link-input" type="text" placeholder="例如：台灣地理、Python 基礎、世界史" />
            <button id="generateTopicBankBtn" class="tool-btn" type="button">
              <i class="fa-solid fa-wand-magic-sparkles"></i> 生成題庫
            </button>
          </div>
        </div>
        <div class="story-tool-panel">
          <label for="uploadStoryBankInput">上傳自己的題庫 JSON</label>
          <div class="story-inline-form">
            <input id="uploadStoryBankInput" class="story-link-input" type="file" accept="application/json,.json" />
            <button id="uploadStoryBankBtn" class="tool-btn secondary" type="button">
              <i class="fa-solid fa-upload"></i> 匯入題庫
            </button>
          </div>
        </div>
      </div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2>選擇故事項目</h2>
        <button id="resetStoryBtn" class="tool-btn secondary"><i class="fa-solid fa-rotate-left"></i> 重設本項進度</button>
      </div>
      <div id="storySubjectList" class="story-subject-grid"></div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2 id="storyBranchTitle">故事支線</h2>
        <div class="story-head-actions">
          <span id="storyBranchMeta" class="tool-note"></span>
          <button id="generateStoryBtn" class="tool-btn"><i class="fa-solid fa-wand-magic-sparkles"></i> AI生成更多題目</button>
        </div>
      </div>
      <div id="storyBranchList" class="story-branch-list"></div>
    </section>

    <!-- 雙人對戰畫面 -->
    <section id="storyDuelSection" class="tool-card story-duel-card" style="display:none;">
      <!-- 倒數計時 -->
      <div class="duel-timer-bar">
        <div class="duel-timer-label">
          <i class="fa-solid fa-clock"></i>
          <span id="duelTimerDisplay">10</span>
        </div>
        <div class="duel-timer-track">
          <div id="duelTimerFill" class="duel-timer-fill"></div>
        </div>
      </div>

      <!-- 雙人分數列 -->
      <div class="duel-score-row">
        <div class="duel-player duel-player-left">
          <div class="duel-avatar" id="duelAvatarLeft">🧑</div>
          <strong id="duelNameLeft">你</strong>
          <span class="duel-score" id="duelScoreLeft">0</span>
        </div>
        <div class="duel-vs-badge">VS</div>
        <div class="duel-player duel-player-right">
          <div class="duel-avatar" id="duelAvatarRight">🤖</div>
          <strong id="duelNameRight">對手</strong>
          <span class="duel-score" id="duelScoreRight">0</span>
        </div>
      </div>

      <!-- 題目進度 -->
      <div class="duel-progress-row">
        <span id="duelQIndex">第 1 題</span>
        <span>/ 20 題</span>
        <span id="duelModeLabel" class="answer-pill">挑戰模式</span>
      </div>

      <!-- 題目 -->
      <div id="duelQuestionBox" class="duel-question-box"></div>

      <!-- 選項 -->
      <div id="duelOptions" class="duel-options"></div>

      <!-- 合作模式：已作答提示 -->
      <div id="coopAnsweredMsg" class="coop-answered-msg" style="display:none;">
        <i class="fa-solid fa-check-circle"></i> 本題已送出答案，等待下一題...
      </div>

      <!-- 結果浮層 -->
      <div id="duelResultOverlay" class="duel-result-overlay" style="display:none;">
        <div class="duel-result-card">
          <div id="duelResultIcon" class="duel-result-icon">🏆</div>
          <h2 id="duelResultTitle">遊戲結束</h2>
          <div class="duel-final-scores">
            <div>
              <span id="duelFinalNameLeft">你</span>
              <strong id="duelFinalScoreLeft">0</strong>
            </div>
            <div>
              <span id="duelFinalNameRight">對手</span>
              <strong id="duelFinalScoreRight">0</strong>
            </div>
          </div>
          <button id="duelPlayAgainBtn" class="tool-btn">
            <i class="fa-solid fa-rotate-right"></i> 再來一局
          </button>
          <button id="duelBackBtn" class="tool-btn secondary">
            <i class="fa-solid fa-chevron-left"></i> 回到模式選擇
          </button>
        </div>
      </div>
    </section>

    <!-- 單人模式作答區 -->
    <section class="tool-card" id="storySoloSection">
      <div id="storyPlayArea" class="story-play-area">
        <p>先選擇一個項目，再挑戰支線關卡。</p>
      </div>
    </section>
  </main>

  <div class="story-modal-backdrop" id="storyModalBackdrop">
    <section class="story-modal">
      <span class="answer-pill" id="storyModalBadge">劇情推進</span>
      <h2 id="storyModalTitle">新的支線片段</h2>
      <p id="storyModalText"></p>
      <button id="storyModalCloseBtn" class="tool-btn"><i class="fa-solid fa-check"></i> 繼續冒險</button>
    </section>
  </div>

  <div class="toast-qa" id="toast"></div>
  <script src="js/i18n.js"></script>
  <script src="js/story_mode.js"></script>
  <script src="js/Audio_manager.js"></script>
  <script src="js/nav_drawer.js"></script>
  <script src="js/music_drawer.js"></script>
</body>
</html>
