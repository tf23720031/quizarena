<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的錯題本 - QuizArena</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/learning_tools.css">
  <link rel="stylesheet" href="css/dark_mode.css">
  <link rel="stylesheet" href="css/wrong_book_extra.css">
</head>
<body>
  <script>
    document.body.classList.toggle('dark-mode', localStorage.getItem('quizDarkMode') === '1');
    // ── Immediately resolve username from ALL possible localStorage keys ──
    (function() {
      function resolveUser() {
        var simpleKeys = ["currentUser","qa_current_user","quizarena_user","username","playerName"];
        for (var i = 0; i < simpleKeys.length; i++) {
          var v = (localStorage.getItem(simpleKeys[i]) || sessionStorage.getItem(simpleKeys[i]) || "").trim();
          if (v && v !== "undefined" && v !== "null" && v !== "guest") return v;
        }
        var profileKeys = ["currentUserProfile","qa_profile_cache","roomPlayerProfile","currentUserProfileData"];
        for (var j = 0; j < profileKeys.length; j++) {
          try {
            var p = JSON.parse(localStorage.getItem(profileKeys[j]) || "null");
            if (!p) continue;
            var u = (p.username || p.account || p.name || p.playerName || "").trim();
            if (u && u !== "undefined" && u !== "null") {
              localStorage.setItem("currentUser", u); // backfill
              return u;
            }
          } catch(e) {}
        }
        return "";
      }
      window.__wbUsername = resolveUser();
      // Set username display immediately without waiting for JS
      document.addEventListener("DOMContentLoaded", function() {
        var el = document.getElementById("wrongUserName");
        var warn = document.getElementById("wbLoginWarn");
        if (el) el.textContent = window.__wbUsername || "(未登入)";
        if (warn) warn.style.display = window.__wbUsername ? "none" : "";
      });
    })();
  </script>
  <main class="tool-shell">
    <header class="tool-topbar">
      <a class="tool-back" href="index.html"><i class="fa-solid fa-chevron-left"></i></a>
      <div>
        <p class="tool-kicker"><i class="fa-solid fa-book-bookmark"></i> Review</p>
        <h1>我的錯題本</h1>
      </div>
    </header>

    <!-- Login warning (shown only if not logged in) -->
    <div id="wbLoginWarn" style="display:none;margin:12px 0;padding:14px 18px;border-radius:16px;background:rgba(255,100,100,.08);border:1.5px solid rgba(255,100,100,.2);color:#be123c;font-size:.9rem;font-weight:700">
      <i class="fa-solid fa-triangle-exclamation"></i> 尚未登入，請先回首頁登入帳號，才能查看錯題本。
    </div>

    <!-- Stats -->
    <section class="summary-grid">
      <article><span><i class="fa-solid fa-circle-xmark"></i> 錯題數</span><strong id="wrongItemCount">0</strong></article>
      <article><span><i class="fa-solid fa-chart-line"></i> 累積答錯</span><strong id="wrongTotalCount">0</strong></article>
      <article><span><i class="fa-solid fa-user"></i> 目前帳號</span><strong id="wrongUserName">-</strong></article>
    </section>

    <!-- AI Advice + Insight -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-lightbulb"></i> 複習建議</h2>
        <button id="getAiAdviceBtn" class="tool-btn" style="background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:.82rem">
          <i class="fa-solid fa-wand-magic-sparkles"></i> AI 給建議
        </button>
      </div>
      <div id="wrongBookInsight" class="wrong-insight-grid"></div>
      <div id="aiAdviceBox" class="wb-ai-box" style="display:none"></div>
    </section>

    <!-- Radar -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-radar"></i> 學習弱點雷達圖</h2>
        <span class="tool-note">依類別、難度、題型統計錯題比例</span>
      </div>
      <div class="radar-layout">
        <canvas id="weaknessRadar" width="420" height="420" aria-label="學習弱點雷達圖"></canvas>
        <div id="weaknessRadarLegend" class="radar-legend"></div>
      </div>
    </section>

    <!-- Knowledge Map -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-map"></i> 知識地圖</h2>
        <span class="tool-note">視覺化各主題掌握狀況</span>
      </div>
      <div id="knowledgeMapArea" class="knowledge-map-area"></div>
    </section>

    <!-- Smart Review tabs -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-brain"></i> 智慧複習</h2>
      </div>
      <div class="wb-review-tabs">
        <button class="wb-tab active" data-tab="today"><i class="fa-solid fa-calendar-day"></i> 今日複習</button>
        <button class="wb-tab" data-tab="ai-rec"><i class="fa-solid fa-robot"></i> AI 推薦</button>
        <button class="wb-tab" data-tab="most-wrong"><i class="fa-solid fa-fire"></i> 最常答錯</button>
        <button class="wb-tab" data-tab="high-err"><i class="fa-solid fa-triangle-exclamation"></i> 高錯誤率</button>
      </div>
      <div id="wb-review-panel" class="wb-review-panel"></div>
    </section>

    <!-- Practice -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-dumbbell"></i> 錯題練習</h2>
        <button id="startPracticeBtn" class="tool-btn"><i class="fa-solid fa-play"></i> 開始練習</button>
      </div>
      <div id="wrongPracticeBox" class="practice-box">
        <p>按下開始練習後，系統會從錯題本抽題，答完可以一直下一題反覆測試。</p>
      </div>
    </section>

    <!-- Review list -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-list-check"></i> 完整複習清單</h2>
        <button id="refreshWrongBookBtn" class="tool-btn"><i class="fa-solid fa-rotate"></i> 重新整理</button>
      </div>
      <div id="wrongBookList" class="question-list"></div>
    </section>
  </main>

  <div class="toast-qa" id="toast"></div>
  <script src="js/api_client.js"></script>
  <script src="js/session_guard.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/wrong_book.js"></script>
  <script src="js/Audio_manager.js"></script>
  <script src="js/nav_drawer.js"></script>
  <script src="js/music_drawer.js"></script>

  <script>
  // ── Smart Review Tabs ──────────────────────────────
  const wbTabBtns = document.querySelectorAll('.wb-tab');
  const wbPanel = document.getElementById('wb-review-panel');
  let _wbActiveTab = 'today';

  function renderWbTab(tab) {
    const items = window._wrongBookItems || [];
    if (!items.length) {
      wbPanel.innerHTML = `<p style="color:#aaa;text-align:center;padding:20px">目前沒有錯題記錄。答錯題目後會自動出現在這裡！</p>`;
      return;
    }
    let filtered = [];
    const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    if (tab === 'today') {
      const todayStart = new Date(); todayStart.setHours(0,0,0,0);
      filtered = items.filter(i => i.lastWrongAt && new Date(i.lastWrongAt) >= todayStart);
      if (!filtered.length) filtered = items.slice(0, 5); // fallback: 5 oldest
    } else if (tab === 'ai-rec') {
      // Sort by wrong count desc, take top 6
      filtered = [...items].sort((a,b) => (b.wrongCount||0)-(a.wrongCount||0)).slice(0,6);
    } else if (tab === 'most-wrong') {
      filtered = [...items].sort((a,b) => (b.wrongCount||0)-(a.wrongCount||0)).slice(0,10);
    } else if (tab === 'high-err') {
      // High error rate = wrongCount / total attempts (estimate as wrongCount)
      filtered = [...items].filter(i => (i.wrongCount||0) >= 2).sort((a,b)=>(b.wrongCount||0)-(a.wrongCount||0)).slice(0,10);
      if (!filtered.length) filtered = items.slice(0,6);
    }

    if (!filtered.length) {
      wbPanel.innerHTML = `<p style="color:#aaa;text-align:center;padding:20px;font-size:.88rem">此分類暫無記錄</p>`;
      return;
    }

    wbPanel.innerHTML = `<div class="wb-mini-list">${filtered.map(item => `
      <div class="wb-mini-card">
        <div class="wb-mini-meta">
          <span class="wb-mini-cat"><i class="fa-solid fa-tag"></i> ${escH(item.category||item.sourceBankTitle||'未知')}</span>
          <span class="wb-mini-diff wb-diff-${item.difficulty||'medium'}">${{easy:'簡單',medium:'中等',hard:'困難'}[item.difficulty]||'中等'}</span>
          <span class="wb-mini-wrong"><i class="fa-solid fa-xmark"></i> ${item.wrongCount||1}次</span>
        </div>
        <p class="wb-mini-q">${escH(item.content||item.title||'題目')}</p>
      </div>
    `).join('')}</div>`;
  }

  wbTabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      wbTabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _wbActiveTab = btn.dataset.tab;
      renderWbTab(_wbActiveTab);
    });
  });

  // Re-render tabs when wrong book loads
  const _origPatch = setInterval(() => {
    if (window._wrongBookItems !== undefined) {
      clearInterval(_origPatch);
      renderWbTab(_wbActiveTab);
    }
  }, 300);

  // ── AI Study Advice ────────────────────────────────
  document.getElementById('getAiAdviceBtn')?.addEventListener('click', async function() {
    const btn = this;
    const box = document.getElementById('aiAdviceBox');
    const items = window._wrongBookItems || [];
    if (!items.length) {
      box.style.display = '';
      box.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#22c55e"></i> 目前沒有錯題，繼續練習後再來查看 AI 建議！';
      return;
    }
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> AI 分析中…';
    box.style.display = '';
    box.innerHTML = '<i class="fa-solid fa-hourglass-half fa-spin"></i> 正在深度分析你的學習狀況…';

    try {
      const summary = items.slice(0, 15).map((item, i) =>
        `${i+1}. [${item.category||'未知'}/${item.difficulty||'medium'}] ${item.content||item.title} (錯${item.wrongCount||1}次)`
      ).join('\n');
      const catCounts = {};
      items.forEach(it => { const c = it.category||'未知'; catCounts[c] = (catCounts[c]||0) + (it.wrongCount||1); });
      const topCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c,n])=>`${c}(${n}次)`).join('、');
      const total = items.reduce((s,i) => s+(i.wrongCount||1), 0);

      const prompt = `你是一位友善、專業的學習顧問，專門協助學生分析錯題。

學習者在 QuizArena 的錯題資料：
- 最弱類別：${topCats}
- 錯題總數：${items.length} 題，累積錯誤：${total} 次

部分錯題紀錄：
${summary}

請用繁體中文提供以下內容（格式清晰，使用 emoji）：

📊 **學習狀況分析**（2-3句，具體點出弱點）

🎯 **三個具體改進建議**（針對最弱類別）

📚 **推薦複習題型**（列出 2-3 種）

⏰ **建議練習順序**（一句話說明）

💪 **鼓勵語**（一句溫暖有力的話）

語氣親切、具體、有建設性，總字數不超過 280 字。`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      let text = (data.content || []).map(c => c.text || '').join('');
      // Convert markdown-ish to HTML
      text = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
      box.innerHTML = `<div class="wb-ai-content">${text}</div>`;
    } catch(e) {
      box.innerHTML = `<div class="wb-ai-content">⚠️ AI 服務暫時無法使用。<br><br>💡 <strong>小提示：</strong>多次答錯的題目優先複習，每天固定練習 10–15 分鐘效果最佳！</div>`;
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 重新分析';
  });
  </script>
</body>
</html>
