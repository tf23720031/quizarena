<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizArena — 錯題練習</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/quizarena_fix.css">
  <style>
    .wb-shell { max-width: 960px; margin: 0 auto; padding: 36px 20px 60px; }
    .wb-hero {
      background: linear-gradient(135deg, #ff9a6c 0%, #ff6b6b 50%, #f25a9e 100%);
      border-radius: 28px;
      padding: 36px 40px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 16px 40px rgba(255,107,107,0.28);
      margin-bottom: 32px;
    }
    .wb-hero-icon { font-size: 3.2rem; opacity: 0.9; }
    .wb-hero h1 { font-size: clamp(1.6rem,3vw,2.4rem); font-weight: 900; margin: 0 0 8px; }
    .wb-hero p { margin: 0; opacity: 0.88; font-size: 1rem; }
    .wb-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 20px; margin-bottom: 28px; }
    .wb-card {
      background: rgba(255,255,255,0.78);
      border: 1.5px solid rgba(255,133,193,0.22);
      border-radius: 22px;
      padding: 26px 24px;
      box-shadow: 0 8px 24px rgba(255,120,179,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .wb-card:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(255,120,179,0.18); }
    .wb-card-icon {
      width: 54px; height: 54px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 14px;
    }
    .wb-card-icon.orange { background: rgba(255,154,108,0.18); color: #ff6b4a; }
    .wb-card-icon.pink   { background: rgba(242,90,158,0.15);  color: #f25a9e; }
    .wb-card-icon.purple { background: rgba(168,117,255,0.15); color: #a875ff; }
    .wb-card-icon.teal   { background: rgba(67,198,172,0.15);  color: #43c6ac; }
    .wb-card h3 { font-size: 1.08rem; font-weight: 800; margin: 0 0 8px; color: #663154; }
    .wb-card p  { font-size: 0.9rem; color: #8e6280; margin: 0; line-height: 1.6; }
    .wb-empty {
      text-align: center;
      padding: 60px 20px;
      background: rgba(255,255,255,0.6);
      border-radius: 22px;
      border: 1.5px dashed rgba(255,133,193,0.3);
    }
    .wb-empty i  { font-size: 3.5rem; color: rgba(255,120,179,0.35); margin-bottom: 16px; display: block; }
    .wb-empty h3 { font-size: 1.2rem; color: #a56b87; margin-bottom: 8px; }
    .wb-empty p  { color: #c09ab0; font-size: 0.92rem; }
    .wb-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: #a875ff; font-weight: 700; text-decoration: none;
      font-size: 0.95rem; margin-bottom: 24px;
    }
    .wb-back:hover { color: #8e5df0; }

    /* dark mode */
    body.dark-mode .wb-card { background: rgba(255,255,255,0.06); border-color: rgba(255,133,193,0.14); }
    body.dark-mode .wb-card h3 { color: #f0b8d8; }
    body.dark-mode .wb-card p  { color: #c09ab0; }
    body.dark-mode .wb-empty { background: rgba(255,255,255,0.04); }

    @media(max-width:600px){
      .wb-hero { flex-direction:column; align-items:flex-start; padding:24px 22px; }
      .wb-hero-icon { font-size:2.4rem; }
    }
  </style>
</head>
<body>
  <!-- Shared Topbar -->
  <header class="top-bar container-fluid">
    <div class="logo-area">
      <a href="index.html"><img src="images/LOGO.png" class="logo-img" alt="QuizArena Logo"></a>
    </div>
    <nav class="top-actions">
      <a href="index.html" class="custom-btn btn-join"><i class="fa-solid fa-house"></i> 回首頁</a>
      <div class="nav-inline-tools">
        <span class="lang-switcher-slot"></span>
        <button class="custom-btn dark-mode-btn" id="darkModeBtn" title="切換深色模式">
          <i class="fa-solid fa-moon" id="darkModeIcon"></i>
        </button>
      </div>
    </nav>
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="選單">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Mobile Drawer -->
  <div class="mobile-drawer-overlay" id="mobileDrawerOverlay"></div>
  <aside class="mobile-drawer" id="mobileDrawer">
    <div class="mobile-drawer-header">
      <img src="images/LOGO.png" class="mobile-drawer-logo" alt="QuizArena Logo">
      <button class="mobile-drawer-close" id="mobileDrawerClose"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="mobile-drawer-body">
      <a href="index.html" class="custom-btn btn-join w-100"><i class="fa-solid fa-house"></i> 回首頁</a>
      <div class="mobile-drawer-tools">
        <span class="lang-switcher-slot"></span>
        <button class="custom-btn dark-mode-btn" id="mobileDarkModeBtn" title="切換深色模式">
          <i class="fa-solid fa-moon" id="mobileDarkModeIcon"></i>
        </button>
      </div>
    </div>
  </aside>

  <div class="wb-shell">
    <a href="index.html" class="wb-back"><i class="fa-solid fa-arrow-left"></i> 回首頁</a>

    <div class="wb-hero">
      <div class="wb-hero-icon"><i class="fa-solid fa-book-bookmark"></i></div>
      <div>
        <h1>錯題練習</h1>
        <p>自動整理你答錯的題目，幫你針對弱點重複練習、查看解析，越練越強！</p>
      </div>
    </div>

    <div class="wb-grid">
      <div class="wb-card">
        <div class="wb-card-icon orange"><i class="fa-solid fa-clock-rotate-left"></i></div>
        <h3>最近錯題</h3>
        <p>系統自動同步你最近答錯的題目，可快速複習弱點知識點。</p>
      </div>
      <div class="wb-card">
        <div class="wb-card-icon pink"><i class="fa-solid fa-dumbbell"></i></div>
        <h3>練習模式</h3>
        <p>重新作答已收藏的錯題，並即時查看詳細解析，鞏固記憶。</p>
      </div>
      <div class="wb-card">
        <div class="wb-card-icon purple"><i class="fa-solid fa-chart-pie"></i></div>
        <h3>答錯分析</h3>
        <p>以圖表呈現錯題分布，快速找出你最需要加強的題目類型。</p>
      </div>
      <div class="wb-card">
        <div class="wb-card-icon teal"><i class="fa-solid fa-star"></i></div>
        <h3>收藏題目</h3>
        <p>將重要題目加入收藏，隨時回頭複習，考前衝刺最有效。</p>
      </div>
    </div>

    <div class="wb-empty">
      <i class="fa-solid fa-inbox"></i>
      <h3>目前還沒有錯題紀錄</h3>
      <p>先去打幾場對戰吧！答錯的題目會自動收集到這裡。</p>
    </div>
  </div>

  <div class="toast-qa" id="toast"></div>
  <script src="js/i18n.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/quizarena_fix.js"></script>
  <script>
    function _applyDark(on) {
      document.body.classList.toggle('dark-mode', on);
      ['darkModeIcon','mobileDarkModeIcon'].forEach(function(id){
        var el=document.getElementById(id);
        if(el) el.className=on?'fa-solid fa-sun':'fa-solid fa-moon';
      });
      localStorage.setItem('quizDarkMode', on?'1':'0');
    }
    ['darkModeBtn','mobileDarkModeBtn'].forEach(function(id){
      var b=document.getElementById(id);
      if(b) b.addEventListener('click',function(){ _applyDark(!document.body.classList.contains('dark-mode')); });
    });
    _applyDark(localStorage.getItem('quizDarkMode')==='1');

    var _drawer=document.getElementById('mobileDrawer');
    var _overlay=document.getElementById('mobileDrawerOverlay');
    function _openDrawer(){ _drawer&&_drawer.classList.add('open'); _overlay&&_overlay.classList.add('show'); document.body.style.overflow='hidden'; }
    function _closeDrawer(){ _drawer&&_drawer.classList.remove('open'); _overlay&&_overlay.classList.remove('show'); document.body.style.overflow=''; }
    document.getElementById('hamburgerBtn')?.addEventListener('click',_openDrawer);
    document.getElementById('mobileDrawerClose')?.addEventListener('click',_closeDrawer);
    _overlay?.addEventListener('click',_closeDrawer);
  </script>
</body>
</html>
