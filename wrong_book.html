<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>錯題練習｜QuizArena</title><link rel="stylesheet" href="css/bootstrap.min.css"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/quizarena_fix.css"></head><body class="wrong-page"><main class="container py-5"><div class="qa-panel"><div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4"><div><h1 class="fw-bold mb-2">錯題練習</h1><p class="mb-0 text-secondary">把答錯的題目集中複習，下一次不要再被同一題偷襲。</p></div><div class="d-flex gap-2"><span class="lang-switcher-slot"></span><button id="darkModeBtn" class="custom-btn btn-auth">🌙</button><a class="custom-btn btn-join text-decoration-none" href="index.html">回首頁</a></div></div><div id="wrongBookList" class="row g-3"></div></div></main><script src="js/i18n.js"></script><script src="js/quizarena_fix.js"></script><script>const u=localStorage.getItem('currentUser')||'';fetch('/wrong_book_detail?username='+encodeURIComponent(u)).then(r=>r.json()).then(d=>{const a=d.items||[];wrongBookList.innerHTML=a.length?a.map(x=>`<div class="col-md-6"><article class="qa-panel h-100"><div class="fw-bold text-pink mb-2">${x.title||'錯題'}</div><div class="mb-2">${x.content||''}</div><div class="small text-secondary">錯 ${x.wrongCount||0} 次｜${x.sourceBankTitle||'題庫'}</div><hr><div>${x.explanation||'尚無解析'}</div></article></div>`).join(''):'<div class="text-center py-5">目前還沒有錯題，這是好事，不是 bug。</div>'}).catch(()=>wrongBookList.innerHTML='<div class="text-center py-5">錯題資料載入失敗，請確認後端有 /wrong_book_detail。</div>')</script></body></html>
