<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的錯題本 - QuizArena</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/learning_tools.css">
  <link rel="stylesheet" href="css/dark_mode.css">
  <link rel="stylesheet" href="css/wrong_book_extra.css">
</head>
<body>
  <script>
    document.body.classList.toggle('dark-mode', localStorage.getItem('quizDarkMode') === '1');
  </script>
  <main class="tool-shell">
    <header class="tool-topbar">
      <a class="tool-back" href="index.html"><i class="fa-solid fa-chevron-left"></i></a>
      <div>
        <p class="tool-kicker">Review</p>
        <h1>我的錯題本</h1>
      </div>
      
    </header>

    <section class="summary-grid">
      <article><span>錯題數</span><strong id="wrongItemCount">0</strong></article>
      <article><span>累積答錯</span><strong id="wrongTotalCount">0</strong></article>
      <article><span>目前帳號</span><strong id="wrongUserName">-</strong></article>
    </section>

    <section class="tool-card">
      <div class="tool-card-head"><h2>複習建議</h2></div>
      <div id="wrongBookInsight" class="wrong-insight-grid"></div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end">
        <button id="getAiAdviceBtn" class="tool-btn" style="background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff">
          <i class="fa-solid fa-wand-magic-sparkles"></i> 讓 AI 給我學習建議
        </button>
      </div>
      <div id="aiAdviceBox" style="display:none;margin-top:14px;padding:16px 20px;border-radius:18px;background:rgba(147,51,234,.07);border:1.5px solid rgba(147,51,234,.15);font-size:.9rem;line-height:1.7;color:#3a1a60;white-space:pre-wrap"></div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2>學習弱點雷達圖</h2>
        <span class="tool-note">依類別、難度、題型統計錯題比例</span>
      </div>
      <div class="radar-layout">
        <canvas id="weaknessRadar" width="420" height="420" aria-label="學習弱點雷達圖"></canvas>
        <div id="weaknessRadarLegend" class="radar-legend"></div>
      </div>
    </section>

    <!-- 知識地圖 -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-map"></i> 知識地圖</h2>
        <span class="tool-note">視覺化各主題掌握狀況</span>
      </div>
      <div id="knowledgeMapArea" class="knowledge-map-area"></div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2>錯題練習</h2>
        <button id="startPracticeBtn" class="tool-btn"><i class="fa-solid fa-play"></i> 開始練習</button>
      </div>
      <div id="wrongPracticeBox" class="practice-box">
        <p>按下開始練習後，系統會從錯題本抽題，答完可以一直下一題反覆測試。</p>
      </div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2>複習清單</h2>
        <button id="refreshWrongBookBtn" class="tool-btn"><i class="fa-solid fa-rotate"></i> 重新整理</button>
      </div>
      <div id="wrongBookList" class="question-list"></div>
    </section>
  </main>

  <div class="toast-qa" id="toast"></div>
  <script src="js/i18n.js"></script>
  <script src="js/wrong_book.js"></script>
  <script src="js/Audio_manager.js"></script>
  <script src="js/nav_drawer.js"></script>
  <script src="js/music_drawer.js"></script>
  <script>
  // AI Study Advice
  document.getElementById('getAiAdviceBtn')?.addEventListener('click', async function() {
    const btn = this;
    const box = document.getElementById('aiAdviceBox');
    const items = window._wrongBookItems || [];
    if (!items.length) { box.style.display=''; box.textContent='目前沒有錯題，繼續練習後再來查看 AI 建議！'; return; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> AI 分析中…';
    box.style.display = '';
    box.textContent = '⏳ 正在分析你的學習狀況…';

    try {
      // Build a summary of wrong items for AI
      const summary = items.slice(0, 15).map((item, i) =>
        `第${i+1}題: [${item.category||'未知'}/${item.difficulty||'medium'}] ${item.content||item.title} (答錯${item.wrongCount||1}次)`
      ).join('\n');

      const catCounts = {};
      items.forEach(it => { const c = it.category||'未知'; catCounts[c] = (catCounts[c]||0) + (it.wrongCount||1); });
      const topCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c,n])=>`${c}(${n}次)`).join('、');

      const prompt = `你是一位友善的學習顧問。以下是學生在 QuizArena 練習題中的錯題紀錄：

最常出錯的類別：${topCats}
錯題總數：${items.length} 題
累積答錯次數：${items.reduce((s,i)=>s+(i.wrongCount||1),0)} 次

部分錯題範例：
${summary}

請用繁體中文給出：
1. 對這位學生學習狀況的簡短分析（2-3句）
2. 針對最弱的類別，提供 3 個具體的改進建議
3. 一句鼓勵的話

語氣要親切、具體、有建設性。不要超過 250 字。`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      const text = (data.content || []).map(c => c.text || '').join('');
      box.textContent = text || '無法取得建議，請稍後再試。';
    } catch(e) {
      box.textContent = '⚠️ AI 服務暫時無法使用，請稍後再試。\n\n小提示：多次答錯的題目優先複習，每天固定練習 10-15 分鐘效果最佳！';
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 重新分析';
  });

  // Expose items for AI (hook into wrong_book load)
  const _origRenderWrongBook = window.renderWrongBook;
  </script>
</body>
</html>
