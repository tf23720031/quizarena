<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的錯題本 - QuizArena</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/learning_tools.css">
  <link rel="stylesheet" href="css/dark_mode.css">
  <link rel="stylesheet" href="css/wrong_book_extra.css">
</head>
<body>
  <script>
    document.body.classList.toggle('dark-mode', localStorage.getItem('quizDarkMode') === '1');
    // ── 統一帳號判定：錯題本一律使用登入帳號 currentUser ──
    // 順序：currentUser → currentUserProfile.username → qa_profile_cache.username
    // 玩家暱稱（playerName）不再用於查錯題本，避免抓錯人
    (function() {
      function resolveLoginUser() {
        var v = (localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser') || '').trim();
        if (v && v !== 'undefined' && v !== 'null' && v !== 'guest') return v;
        try {
          var p = JSON.parse(localStorage.getItem('currentUserProfile') || localStorage.getItem('qa_profile_cache') || 'null');
          if (p && p.username) {
            var u = String(p.username).trim();
            if (u && u !== 'undefined' && u !== 'null') {
              localStorage.setItem('currentUser', u);
              return u;
            }
          }
        } catch(e) {}
        return '';
      }
      window.__wbUsername = resolveLoginUser();
      document.addEventListener('DOMContentLoaded', function() {
        var el = document.getElementById('wrongUserName');
        var warn = document.getElementById('wbLoginWarn');
        if (el) el.textContent = window.__wbUsername || '(未登入)';
        if (warn) warn.style.display = window.__wbUsername ? 'none' : '';
      });
    })();
  </script>
  <main class="tool-shell">
    <header class="tool-topbar">
      <a class="tool-back" href="index.html"><i class="fa-solid fa-chevron-left"></i></a>
      <div>
        <p class="tool-kicker"><i class="fa-solid fa-book-bookmark"></i> Review</p>
        <h1>我的錯題本</h1>
      </div>
    </header>

    <div id="wbLoginWarn" style="display:none;margin:12px 0;padding:14px 18px;border-radius:16px;background:rgba(255,100,100,.08);border:1.5px solid rgba(255,100,100,.2);color:#be123c;font-size:.9rem;font-weight:700">
      <i class="fa-solid fa-triangle-exclamation"></i> 尚未登入，請先回首頁登入帳號，才能查看錯題本。
    </div>

    <section class="summary-grid">
      <article><span><i class="fa-solid fa-circle-xmark"></i> 錯題數</span><strong id="wrongItemCount">0</strong></article>
      <article><span><i class="fa-solid fa-chart-line"></i> 累積答錯</span><strong id="wrongTotalCount">0</strong></article>
      <article><span><i class="fa-solid fa-user"></i> 目前帳號</span><strong id="wrongUserName">-</strong></article>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-lightbulb"></i> 複習建議</h2>
        <button id="getAiAdviceBtn" class="tool-btn" style="background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:.82rem">
          <i class="fa-solid fa-wand-magic-sparkles"></i> AI 給建議
        </button>
      </div>
      <div id="wrongBookInsight" class="wrong-insight-grid"></div>
      <div id="aiAdviceBox" class="wb-ai-box" style="display:none"></div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-radar"></i> 學習弱點雷達圖</h2>
        <span class="tool-note">依類別、難度、題型統計錯題比例</span>
      </div>
      <div class="radar-layout">
        <canvas id="weaknessRadar" width="420" height="420" aria-label="學習弱點雷達圖"></canvas>
        <div id="weaknessRadarLegend" class="radar-legend"></div>
      </div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-map"></i> 知識地圖</h2>
        <span class="tool-note">視覺化各主題掌握狀況</span>
      </div>
      <div id="knowledgeMapArea" class="knowledge-map-area"></div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-brain"></i> 智慧複習</h2>
      </div>
      <div class="wb-review-tabs">
        <button class="wb-tab active" data-tab="today"><i class="fa-solid fa-calendar-day"></i> 今日複習</button>
        <button class="wb-tab" data-tab="ai-rec"><i class="fa-solid fa-robot"></i> AI 推薦</button>
        <button class="wb-tab" data-tab="most-wrong"><i class="fa-solid fa-fire"></i> 最常答錯</button>
        <button class="wb-tab" data-tab="high-err"><i class="fa-solid fa-triangle-exclamation"></i> 高錯誤率</button>
      </div>
      <div id="wb-review-panel" class="wb-review-panel"></div>
    </section>

    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-dumbbell"></i> 錯題練習</h2>
        <button id="startPracticeBtn" class="tool-btn"><i class="fa-solid fa-play"></i> 開始練習</button>
      </div>
      <div id="wrongPracticeBox" class="practice-box">
        <p>按下開始練習後，系統會從錯題本抽題，答完可以一直下一題反覆測試。</p>
      </div>
    </section>

    <!-- Review list (with subject filter + scrollable area) -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-list-check"></i> 完整複習清單</h2>
        <button id="refreshWrongBookBtn" class="tool-btn"><i class="fa-solid fa-rotate"></i> 重新整理</button>
      </div>

      <div class="wb-filter-row" id="wbSubjectFilterRow" role="tablist" aria-label="科目篩選">
        <button class="wb-chip active" data-subject="all" type="button">全部</button>
        <button class="wb-chip" data-subject="國文" type="button">國文</button>
        <button class="wb-chip" data-subject="英文" type="button">英文</button>
        <button class="wb-chip" data-subject="數學" type="button">數學</button>
        <button class="wb-chip" data-subject="自然" type="button">自然</button>
        <button class="wb-chip" data-subject="社會" type="button">社會</button>
        <button class="wb-chip" data-subject="程式" type="button">程式</button>
        <button class="wb-chip" data-subject="其他" type="button">其他</button>
      </div>
      <div class="wb-filter-row" style="margin-top:6px;">
        <label class="wb-sort-label" for="wbSortSelect">排序方式：</label>
        <select id="wbSortSelect" class="wb-sort-select">
          <option value="recent">最近錯誤</option>
          <option value="most-wrong">答錯最多次</option>
          <option value="hardest">難度高 → 低</option>
          <option value="alpha">標題排序</option>
        </select>
        <span class="wb-filter-count" id="wbFilterCount"></span>
      </div>

      <div id="wrongBookListScroll" class="wb-scroll">
        <div id="wrongBookList" class="question-list"></div>
      </div>
    </section>

    <!-- 能力雷達圖（對比全體與第一名） — 移回 tool-shell -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-chart-area"></i> 能力雷達圖</h2>
        <span class="tool-note">比較自己、全體平均、第一名</span>
      </div>
      <div class="wb-radar-controls">
        <label class="wb-radar-label" for="abilityRadarPlayerInput">查詢帳號：</label>
        <input id="abilityRadarPlayerInput" class="wb-radar-input" type="text" placeholder="輸入帳號或暱稱…">
        <button id="abilityRadarReloadBtn" class="tool-btn" type="button"><i class="fa-solid fa-rotate"></i> 重新查詢</button>
      </div>
      <p class="wb-radar-legend-note">
        <span class="wb-dot self"></span> 你
        <span class="wb-dot avg"></span> 全體平均
        <span class="wb-dot top"></span> 第一名
      </p>
      <div class="wb-radar-wrap">
        <canvas id="analytics-radar-canvas" height="300" aria-label="能力雷達圖（對比分析）"></canvas>
        <div id="abilityRadarEmpty" class="wb-radar-empty" style="display:none;">
          <i class="fa-solid fa-chart-line"></i>
          <p>目前沒有比賽紀錄，完成遊戲後會產生能力分析。</p>
        </div>
      </div>
    </section>
  </main>

  <div class="toast-qa" id="toast"></div>
  <script src="js/api_client.js"></script>
  <script src="js/session_guard.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/wrong_book.js"></script>
  <script src="js/Audio_manager.js"></script>
  <script src="js/nav_drawer.js"></script>
  <script src="js/music_drawer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/analytics-radar.js"></script>

  <!-- ── 能力雷達圖：等 Chart.js 載入完成後再初始化；無資料 / API 錯誤時顯示提示 ── -->
  <script>
    (function() {
      function waitForChart(cb, maxTries) {
        var tries = 0;
        function tick() {
          if (typeof window.Chart !== 'undefined' && window.RadarChart) { cb(); return; }
          if (++tries > (maxTries || 60)) return;
          setTimeout(tick, 100);
        }
        tick();
      }

      function showRadarEmpty(msg) {
        var canvas = document.getElementById('analytics-radar-canvas');
        var box = document.getElementById('abilityRadarEmpty');
        if (canvas) canvas.style.display = 'none';
        if (box) {
          box.style.display = '';
          var p = box.querySelector('p');
          if (p && msg) p.textContent = msg;
        }
      }
      function showRadarCanvas() {
        var canvas = document.getElementById('analytics-radar-canvas');
        var box = document.getElementById('abilityRadarEmpty');
        if (canvas) canvas.style.display = '';
        if (box) box.style.display = 'none';
      }

      async function loadAbilityRadar(playerName) {
        playerName = (playerName || '').trim();
        if (!playerName) {
          showRadarEmpty('???????????????');
          return;
        }
        showRadarCanvas();
        try {
          const res = await fetch('/api/radar/' + encodeURIComponent(playerName));
          if (!res.ok) {
            showRadarEmpty('???????????HTTP ' + res.status + '??????????? Render ??????????');
            return;
          }
          const data = await res.json();
          if (data && data.error) {
            showRadarEmpty('?????????' + data.error);
            return;
          }
          var hasData = data && data.has_data !== false && Number(data.match_count || 0) > 0;
          if (!hasData) {
            showRadarEmpty('?????????????????????????????????????????????????');
            return;
          }
          if (!window.RadarChart || typeof window.RadarChart.render !== 'function') {
            showRadarEmpty('?????????????????????');
            return;
          }
          window.RadarChart.render('analytics-radar-canvas', data);
        } catch (err) {
          console.warn('[abilityRadar] load error', err);
          showRadarEmpty('???????????????');
        }
      }

      waitForChart(function() {
        var input = document.getElementById('abilityRadarPlayerInput');
        var btn = document.getElementById('abilityRadarReloadBtn');
        // 使用登入帳號 currentUser，不再用 playerName 抓錯人
        var defaultUser = window.__wbUsername || '';
        if (input) input.value = defaultUser;
        loadAbilityRadar(defaultUser);
        if (btn && input) {
          btn.addEventListener('click', function() {
            loadAbilityRadar((input.value || '').trim());
          });
          input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loadAbilityRadar((input.value || '').trim());
          });
        }
      });
    })();
  </script>

  <!-- ── Smart Review Tabs + AI Advice ── -->
  <script>
  // ── 今日複習：以 Asia/Taipei 取得「今天 00:00」毫秒，後端 lastWrongAt 是秒級需 *1000 ──
  function _wbTaipeiDayStartMs() {
    const now = new Date();
    // 算現在 Taipei 偏移
    const taipeiNow = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
    const offsetMs = now.getTime() - taipeiNow.getTime();
    const taipeiMidnight = new Date(taipeiNow);
    taipeiMidnight.setHours(0, 0, 0, 0);
    return taipeiMidnight.getTime() + offsetMs;
  }

  const wbTabBtns = document.querySelectorAll('.wb-tab');
  const wbPanel = document.getElementById('wb-review-panel');
  let _wbActiveTab = 'today';

  function renderWbTab(tab) {
    const items = window._wrongBookItems || [];
    if (!items.length) {
      wbPanel.innerHTML = `<p style="color:#aaa;text-align:center;padding:20px">目前沒有錯題記錄。答錯題目後會自動出現在這裡！</p>`;
      return;
    }
    let filtered = [];
    const escH = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    if (tab === 'today') {
      const todayStartMs = _wbTaipeiDayStartMs();
      // lastWrongAt 後端是「秒級」timestamp → 要 *1000 才是毫秒
      filtered = items.filter(i => {
        if (!i.lastWrongAt) return false;
        const ts = Number(i.lastWrongAt);
        if (!ts || isNaN(ts)) return false;
        const ms = ts > 1e12 ? ts : ts * 1000; // 自動偵測秒/毫秒
        return ms >= todayStartMs;
      });
      if (!filtered.length) {
        wbPanel.innerHTML = `<p style="color:#aaa;text-align:center;padding:20px;font-size:.88rem">今天還沒有新的錯題，要不要先複習舊題？</p>`;
        return;
      }
    } else if (tab === 'ai-rec') {
      filtered = [...items].sort((a,b) => (b.wrongCount||0)-(a.wrongCount||0)).slice(0,6);
    } else if (tab === 'most-wrong') {
      filtered = [...items].sort((a,b) => (b.wrongCount||0)-(a.wrongCount||0)).slice(0,10);
    } else if (tab === 'high-err') {
      filtered = [...items].filter(i => (i.wrongCount||0) >= 2).sort((a,b)=>(b.wrongCount||0)-(a.wrongCount||0)).slice(0,10);
      if (!filtered.length) filtered = items.slice(0,6);
    }

    if (!filtered.length) {
      wbPanel.innerHTML = `<p style="color:#aaa;text-align:center;padding:20px;font-size:.88rem">此分類暫無記錄</p>`;
      return;
    }

    wbPanel.innerHTML = `<div class="wb-mini-list">${filtered.map(item => `
      <div class="wb-mini-card">
        <div class="wb-mini-meta">
          <span class="wb-mini-cat"><i class="fa-solid fa-tag"></i> ${escH(item.category||item.sourceBankTitle||'未知')}</span>
          <span class="wb-mini-diff wb-diff-${item.difficulty||'medium'}">${({easy:'簡單',medium:'中等',hard:'困難'}[item.difficulty])||'中等'}</span>
          <span class="wb-mini-wrong"><i class="fa-solid fa-xmark"></i> ${item.wrongCount||1}次</span>
        </div>
        <p class="wb-mini-q">${escH(item.content||item.title||'題目')}</p>
      </div>
    `).join('')}</div>`;
  }

  wbTabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      wbTabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _wbActiveTab = btn.dataset.tab;
      renderWbTab(_wbActiveTab);
    });
  });

  const _origPatch = setInterval(() => {
    if (window._wrongBookItems !== undefined) {
      clearInterval(_origPatch);
      renderWbTab(_wbActiveTab);
    }
  }, 300);
  window.__wbRefreshSmartTabs = () => renderWbTab(_wbActiveTab);

  // ── AI Study Advice ────────────────────────────────
  document.getElementById('getAiAdviceBtn')?.addEventListener('click', async function() {
    const btn = this;
    const box = document.getElementById('aiAdviceBox');
    const items = window._wrongBookItems || [];
    if (!items.length) {
      box.style.display = '';
      box.innerHTML = '<i class="fa-solid fa-circle-check" style="color:#22c55e"></i> 目前沒有錯題，繼續練習後再來查看 AI 建議！';
      return;
    }
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> AI 分析中…';
    box.style.display = '';
    box.innerHTML = '<i class="fa-solid fa-hourglass-half fa-spin"></i> 正在深度分析你的學習狀況…';

    try {
      const summary = items.slice(0, 15).map((item, i) =>
        `${i+1}. [${item.category||'未知'}/${item.difficulty||'medium'}] ${item.content||item.title} (錯${item.wrongCount||1}次)`
      ).join('\n');
      const catCounts = {};
      items.forEach(it => { const c = it.category||'未知'; catCounts[c] = (catCounts[c]||0) + (it.wrongCount||1); });
      const topCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([c,n])=>`${c}(${n}次)`).join('、');
      const total = items.reduce((s,i) => s+(i.wrongCount||1), 0);

      const prompt = `你是一位友善、專業的學習顧問，專門協助學生分析錯題。

學習者在 QuizArena 的錯題資料：
- 最弱類別：${topCats}
- 錯題總數：${items.length} 題，累積錯誤：${total} 次

部分錯題紀錄：
${summary}

請用繁體中文提供以下內容（格式清晰，使用 emoji）：

📊 **學習狀況分析**（2-3句，具體點出弱點）

🎯 **三個具體改進建議**（針對最弱類別）

📚 **推薦複習題型**（列出 2-3 種）

⏰ **建議練習順序**（一句話說明）

💪 **鼓勵語**（一句溫暖有力的話）

語氣親切、具體、有建設性，總字數不超過 280 字。`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      let text = (data.content || []).map(c => c.text || '').join('');
      text = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
      box.innerHTML = `<div class="wb-ai-content">${text}</div>`;
    } catch(e) {
      box.innerHTML = `<div class="wb-ai-content">⚠️ AI 服務暫時無法使用。<br><br>💡 <strong>小提示：</strong>多次答錯的題目優先複習，每天固定練習 10–15 分鐘效果最佳！</div>`;
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> 重新分析';
  });
  </script>
</body>
</html>
