<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排行榜 — QuizArena</title>
<link rel="stylesheet" href="css/analytics.css">
</head>
<body class="analytics-page" style="padding:20px;max-width:800px;margin:0 auto;">

<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
  <a href="/" style="color:#a78bfa;text-decoration:none;font-size:20px;">←</a>
  <h1 class="gradient-title" style="font-size:26px;">🏆 名人榜</h1>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('total',this)">🏆 總排名</button>
  <button class="tab-btn" onclick="switchTab('subject',this)">📚 各科</button>
  <button class="tab-btn" onclick="switchTab('winrate',this)">⚔️ 勝率</button>
  <button class="tab-btn" onclick="switchTab('streak',this)">🔥 連勝</button>
  <button class="tab-btn" onclick="switchTab('daily',this)">📅 今日</button>
  <button class="tab-btn" onclick="switchTab('weekly',this)">📆 本週</button>
</div>

<!-- 各科 Tab 額外下拉 -->
<div id="subject-selector" style="display:none;margin-bottom:12px;">
  <select id="subject-select" onchange="loadLeaderboard('subject')"
    style="background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.4);color:#e9d5ff;padding:6px 12px;border-radius:8px;font-size:13px;">
    <option value="">全部科目</option>
  </select>
</div>

<div id="lb-content">
  <div style="text-align:center;color:#6d28d9;padding:40px;">載入中...</div>
</div>

<!-- 自己的名次 sticky 卡片 -->
<div id="my-rank-sticky" style="display:none;position:sticky;bottom:16px;background:rgba(124,58,237,0.9);backdrop-filter:blur(8px);border-radius:12px;padding:10px 16px;align-items:center;gap:12px;border:1px solid var(--purple-primary);">
  <span style="color:#fbbf24;font-weight:700;" id="my-sticky-rank"></span>
  <span style="flex:1;color:#e9d5ff;">你的排名</span>
  <span style="color:#ffd700;font-weight:700;" id="my-sticky-score"></span>
</div>

<script src="js/analytics-leaderboard.js"></script>
</body>
</html>
