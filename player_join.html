<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>player_join</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/player_join.css">
</head>
<body>
  <div class="join-bg"></div>

  <main class="join-shell">
    <header class="join-topbar">
      <img src="images/LOGO.png" alt="QuizArena Logo" class="join-logo">

      <span class="lang-switcher-slot" style="margin-left:auto;margin-right:12px;"></span>
      <button class="back-home-btn" onclick="location.href='index.html'">
        <i class="fa-solid fa-arrow-left"></i>
        回首頁
      </button>
    </header>

    <section class="join-layout">
      <!-- 左側預覽 -->
      <div class="left-panel">
        <div class="player-preview-card">
          <div class="preview-stage">
            <img src="images/face/face.png" class="avatar-layer face-layer" id="previewFace" alt="face">
            <img src="images/face/eyes01.png" class="avatar-layer eye-layer" id="previewEye" alt="eye">
            <img src="images/hair/hair01.png" class="avatar-layer hair-layer" id="previewHair" alt="hair">
          </div>

          <h3 id="previewPlayerName">玩家名稱</h3>

          <div class="preview-actions">
            <button type="button" class="mini-btn" id="randomBtn">
              <i class="fa-solid fa-dice"></i> 隨機
            </button>
            <button type="button" class="mini-btn" id="resetBtn">
              <i class="fa-solid fa-rotate-left"></i> 重設
            </button>
          </div>
        </div>
      </div>

      <!-- 右側設定 -->
      <div class="right-panel">
        <div class="join-info-box">
          <h1>進入房間前先整理門面</h1>
          <p>房間資料、玩家名稱與頭像都會同步到等待室與聊天室。</p>

          <div class="room-info-grid">
            <div class="info-card">
              <span>房間名稱</span>
              <strong id="roomNameText">-</strong>
            </div>

            <div class="info-card">
              <span>房間 PIN</span>
              <strong id="roomPinText">------</strong>
            </div>

            <div class="info-card">
              <span>題庫</span>
              <strong id="roomBankText">-</strong>
            </div>

            <div class="info-card">
              <span>模式</span>
              <strong id="roomModeText">個人賽</strong>
            </div>
          </div>

          <div class="field-block">
            <label for="playerNameInput">玩家名稱</label>
            <input type="text" id="playerNameInput" placeholder="請輸入玩家名稱" maxlength="20">
          </div>

          <div class="field-block">
            <label>使用自己的頭像</label>
            <button type="button" class="upload-avatar-btn" id="profileAvatarToggleBtn" aria-pressed="false">
              <i class="fa-solid fa-toggle-off"></i> 關閉，使用捏人
            </button>
            <div class="upload-hint">開啟後會套用個人資料中上傳的頭像；關閉後可自由調整髮型與眼睛。</div>
          </div>

          <div class="tab-switch">
            <button type="button" class="switch-btn active" id="hairTabBtn">髮型</button>
            <button type="button" class="switch-btn" id="eyeTabBtn">眼睛</button>
          </div>

          <div class="custom-box">
            <button type="button" class="circle-arrow" id="prevBtn">
              <i class="fa-solid fa-chevron-left"></i>
            </button>

            <div class="custom-stage-wrap">
              <div class="custom-stage" id="customStage">
                <img src="images/face/face.png" class="avatar-layer face-layer" id="mainFace" alt="face">
                <img src="images/face/eyes01.png" class="avatar-layer eye-layer" id="mainEye" alt="eye">
                <img src="images/hair/hair01.png" class="avatar-layer hair-layer" id="mainHair" alt="hair">
              </div>

              <div class="slider-side" id="eyeSliderBox">
                <div class="slider-title">眼睛位置微調</div>
                <input type="range" min="-12" max="12" value="0" id="eyeSlider" class="vertical-slider">
              </div>
            </div>

            <button type="button" class="circle-arrow" id="nextBtn">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>

          <div class="bottom-actions">
            <button type="button" class="confirm-btn" id="joinRoomBtn">
              進入房間
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/bootstrap.bundle.min.js"></script>
  <script src="js/Audio_manager.js"></script>
  <script src="js/player_join.js"></script>
</body>
</html>
