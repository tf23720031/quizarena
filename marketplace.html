<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>題庫市集 - QuizArena</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/learning_tools.css">
  <link rel="stylesheet" href="css/dark_mode.css">
  <link rel="stylesheet" href="css/marketplace.css">
</head>
<body>
  <script>document.body.classList.toggle('dark-mode', localStorage.getItem('quizDarkMode') === '1');</script>
  <main class="tool-shell">
    <header class="tool-topbar">
      <a class="tool-back" href="index.html"><i class="fa-solid fa-chevron-left"></i></a>
      <div>
        <p class="tool-kicker">Marketplace</p>
        <h1>題庫市集</h1>
      </div>
      <button id="publishMyBankBtn" class="tool-btn" style="margin-left:auto">
        <i class="fa-solid fa-upload"></i> 上架我的題庫
      </button>
    </header>

    <section class="summary-grid">
      <article><span>公開題庫</span><strong id="mktTotal">0</strong></article>
      <article><span>本週新增</span><strong id="mktWeekly">0</strong></article>
      <article><span>總評分</span><strong id="mktAvgRating">-</strong></article>
    </section>

    <!-- 搜尋 -->
    <section class="tool-card">
      <div class="mkt-search-row">
        <input type="text" id="mktSearchInput" class="mkt-search-input" placeholder="搜尋題庫名稱、類別…">
        <button id="mktSearchBtn" class="tool-btn"><i class="fa-solid fa-magnifying-glass"></i> 搜尋</button>
      </div>
      <div class="mkt-filter-row" id="mktFilterRow">
        <button class="mkt-filter-btn active" data-filter="all">全部</button>
        <button class="mkt-filter-btn" data-filter="hot"><i class="fa-solid fa-fire"></i> 熱門</button>
        <button class="mkt-filter-btn" data-filter="new"><i class="fa-solid fa-sparkles"></i> 最新</button>
        <button class="mkt-filter-btn" data-filter="mine"><i class="fa-solid fa-user"></i> 我上架的</button>
      </div>
    </section>

    <!-- 排行榜 -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2><i class="fa-solid fa-ranking-star"></i> 熱門題庫排行榜</h2>
      </div>
      <div id="mktLeaderboard" class="mkt-leaderboard"></div>
    </section>

    <!-- 題庫列表 -->
    <section class="tool-card">
      <div class="tool-card-head">
        <h2>所有公開題庫</h2>
        <span class="tool-note" id="mktResultNote"></span>
      </div>
      <div id="mktBankList" class="mkt-bank-list"></div>
    </section>
  </main>

  <!-- 上架 Modal -->
  <div class="mkt-modal-backdrop" id="publishModal" style="display:none">
    <div class="mkt-modal">
      <h3><i class="fa-solid fa-upload"></i> 上架題庫</h3>
      <label>選擇題庫</label>
      <select id="publishBankSelect" class="mkt-search-input" style="margin-bottom:12px;"></select>
      <label>介紹說明（可選）</label>
      <textarea id="publishDescription" class="mkt-search-input" style="min-height:80px;resize:vertical" placeholder="讓其他人了解這個題庫的用途…"></textarea>
      <div class="mkt-modal-actions">
        <button id="doPublishBtn" class="tool-btn"><i class="fa-solid fa-check"></i> 確認上架</button>
        <button id="cancelPublishBtn" class="tool-btn secondary">取消</button>
      </div>
    </div>
  </div>

  <div class="toast-qa" id="toast"></div>
  <script src="js/i18n.js"></script>
  <script src="js/marketplace.js"></script>
  <script src="js/Audio_manager.js"></script>
  <script src="js/music_drawer.js"></script>
</body>
</html>
