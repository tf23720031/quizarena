        <button class="mkt-qs-tag" data-kw="程式語言"><i class="fa-solid fa-code"></i> 程式</button>

      <label><i class="fa-solid fa-list-check"></i> 選擇題庫</label>

      <label><i class="fa-solid fa-align-left"></i> 介紹說明（可選）</label>
      <textarea id="publishDescription" class="mkt-search-input" style="min-height:80px;resize:vertical" placeholder="讓其他人了解這個題庫的用途…"></textarea>
      <label><i class="fa-solid fa-file-code"></i> 或上傳自己的題庫 JSON（至少 5 題）</label>
      <input id="publishUploadInput" type="file" class="mkt-search-input" accept="application/json,.json">
      <div class="mkt-modal-actions">
        <button id="doPublishBtn" class="tool-btn"><i class="fa-solid fa-check"></i> 確認上架</button>
        <button id="cancelPublishBtn" class="tool-btn secondary"><i class="fa-solid fa-xmark"></i> 取消</button>
      </div>
    </div>
  </div>

  <div class="toast-qa" id="toast"></div>

  <script src="js/i18n.js"></script>
  <script src="js/marketplace.js"></script>
  <script src="js/Audio_manager.js"></script>
  <script src="js/nav_drawer.js"></script>
  <script src="js/music_drawer.js"></script>

  <!-- Particle system -->
  <script>
  (function() {
    const canvas = document.getElementById('mktParticleCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const ICONS = ['✦','✧','◆','◇','★','☆','♦','❋','✿','❀','♪','♫','◈','⬡','⬢'];
    let W, H, particles = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = [
      'rgba(200,100,255,VAL)','rgba(255,100,180,VAL)','rgba(100,180,255,VAL)',
      'rgba(255,210,100,VAL)','rgba(180,255,200,VAL)','rgba(255,150,200,VAL)'
    ];

    function mkParticle() {
      const col = COLORS[Math.random()*COLORS.length|0].replace('VAL', (Math.random()*.5+.2).toFixed(2));
      return {
        x: Math.random()*W, y: Math.random()*H + H,
        vy: -(Math.random()*0.6+0.25),
        vx: (Math.random()-.5)*0.3,
        size: Math.random()*11+7,
        icon: ICONS[Math.random()*ICONS.length|0],
        color: col,
        rot: Math.random()*360,
        rotV: (Math.random()-.5)*0.7,
        life: 1,
        decay: Math.random()*.002+.001
      };
    }

    for(let i=0;i<55;i++) {
      const p = mkParticle();
      p.y = Math.random()*H;
      particles.push(p);
    }

    function frame() {
      ctx.clearRect(0,0,W,H);
      if(particles.length < 55) particles.push(mkParticle());
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.life -= p.decay;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.life * 0.8);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI/180);
        ctx.font = `${p.size}px serif`;
        ctx.fillStyle = p.color;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.icon, 0, 0);
        ctx.restore();
      });
      requestAnimationFrame(frame);
    }
    frame();
  })();
  </script>

  <!-- Auto-focus search on filter click + quick search tags -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    // Quick-search tags
    document.querySelectorAll('.mkt-qs-tag').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var kw = btn.dataset.kw || btn.textContent.trim();
        var input = document.getElementById('mktSearchInput');
        if (input) {
          input.value = kw;
          input.focus();
          // Trigger search
          var searchBtn = document.getElementById('mktSearchBtn');
          if (searchBtn) searchBtn.click();
        }
        // Highlight active tag
        document.querySelectorAll('.mkt-qs-tag').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  });
  </script>
</body>
</html>
