<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizArena Game</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/quiz_game.css">
</head>
<body>
  <main class="game-shell">

    <!-- 頂部資訊列 -->
    <header class="game-topbar">
      <img src="images/LOGO.png" alt="logo" class="game-logo">
      <div class="game-badges">
        <span class="badge-pill">PIN <strong id="roomPinText">------</strong></span>
        <span class="badge-pill" id="badgePlayerName">玩家 <strong id="playerNameText">-</strong></span>
        <span class="badge-pill" id="badgeRole">身分 <strong id="roleText">-</strong></span>
        <span class="badge-pill">倒數 <strong id="countdownText">-</strong></span>
        <!-- 房主隱藏分數 badge -->
        <span class="badge-pill" id="scoreBadgePill">分數 <strong id="totalScoreText">0</strong></span>
      </div>
      <button class="leave-game-btn" id="leaveGameBtn">
        <i class="fa-solid fa-right-from-bracket"></i> 離開
      </button>
    </header>

    <!-- 主佈局 -->
    <section class="game-layout">

      <!-- 左側：進度 ＋ 排行榜 -->
      <aside class="side-board glass-card">
        <div class="progress-copy" id="progressText">題目載入中...</div>
        <div class="leaderboard-title">🏅 排行榜</div>
        <div id="leaderboardList" class="leaderboard-list"></div>
      </aside>

      <!-- 中央：依身分分開顯示 -->
      <section class="main-board glass-card">

        <!-- ══ 房主視角 ══ -->
        <div id="hostView" style="display:none;">

          <!-- 目前題目摘要 -->
          <div class="host-question-header">
            <span class="question-kicker" id="hostQuestionKicker">Question</span>
            <h2 class="question-title" id="hostQuestionTitle">等待遊戲開始...</h2>
            <p class="question-content" id="hostQuestionContent"></p>
            <img id="hostQuestionImage" class="question-image" alt="" style="display:none;">
            <!-- 房主看選項（灰色顯示，標出正解，不可點） -->
            <div id="hostOptionsList" class="options-list host-options-list"></div>
          </div>

          <!-- 房主監控區 -->
          <div class="host-monitor-box" id="hostMonitorBox">
            <div class="host-monitor-title">
              <i class="fa-solid fa-chalkboard-teacher"></i> 玩家答題狀況
            </div>
            <div id="hostAnswerStatus" class="host-answer-status"></div>

            <button id="hostAllDoneSkipBtn" class="submit-btn host-skip-early-btn" style="display:none;">
              <i class="fa-solid fa-forward-step"></i> 所有人已作答，結束本題
            </button>

            <div class="host-breakdown-title">本題各選項統計</div>
            <div id="hostAnswerBreakdown" class="host-answer-breakdown"></div>
          </div>
        </div>

        <!-- ══ 玩家視角 ══ -->
        <div id="playerView" style="display:none;">
          <div id="questionWrap">
            <div class="question-kicker" id="questionKicker">Question</div>
            <h1 class="question-title" id="questionTitle">題目載入中...</h1>
            <p class="question-content" id="questionContent"></p>
            <img id="questionImage" class="question-image" alt="question image" style="display:none;">
            <div id="optionsList" class="options-list"></div>
            <button id="submitAnswerBtn" class="submit-btn">提交答案</button>
          </div>
        </div>

        <!-- 遊戲結束（共用） -->
        <div id="finishWrap" class="finish-wrap" style="display:none;">
          <h2>🎉 遊戲結束！</h2>
          <p>感謝參與，最終結果請見結算頁面。</p>
          <div class="finish-score">你的總分：<strong id="finishScoreText">0</strong></div>
        </div>

      </section>

      <!-- 右側：玩家頭像列表 -->
      <aside class="player-side-panel glass-card">
        <div class="psp-title"><i class="fa-solid fa-users"></i> 玩家</div>
        <div id="playerSideList" class="player-side-list"></div>
      </aside>

    </section>
  </main>

  <!-- ══ 答題結果 Overlay（玩家用）══ -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div class="result-badge" id="resultBadge">答對了！</div>
      <div class="result-score">本題得分：<strong id="earnedScoreText">0</strong></div>
      <div class="result-answer">正解：<span id="correctAnswerText">A</span></div>
      <div class="result-my-score">
        我的目前總分：<strong id="myLiveScoreText">0</strong>
      </div>
      <div class="result-rank-box" id="myRankBox" style="display:none;">
        <strong id="myRankText">你目前第 1 名</strong>
      </div>
      <div class="result-top5-title">目前前五名</div>
      <div id="resultTop5List" class="result-top5-list"></div>
      <div class="result-explanation" id="resultExplanation">解析</div>
      <div class="result-actions">
        <!-- 房主在「解析 overlay」才看到跳過按鈕 -->
        <button class="submit-btn" id="skipExplanationBtn" style="display:none;">
          <i class="fa-solid fa-forward"></i> 跳過解析，進入下一題
        </button>
        <button class="submit-btn secondary-btn" id="nextQuestionBtn" style="display:none;">
          繼續等待
        </button>
      </div>
    </div>
  </div>

  <!-- ══ 房主解析 Overlay ══ -->
  <div class="result-overlay" id="hostExplanationOverlay">
    <div class="result-card">
      <div class="result-badge host-badge-label">📊 本題結果</div>
      <div class="result-answer" style="font-size:1.1rem;margin:8px 0">
        正解：<span id="hostCorrectAnswerText">-</span>
      </div>
      <div class="result-explanation" id="hostExplanationText">-</div>
      <div class="result-top5-title">目前排行</div>
      <div id="hostResultTop5List" class="result-top5-list"></div>
      <div class="result-actions">
        <button class="submit-btn" id="hostSkipExplanationBtn">
          <i class="fa-solid fa-forward"></i> 進入下一題
        </button>
      </div>
    </div>
  </div>

  <!-- ══ 頒獎台 Overlay ══ -->
  <div class="podium-overlay" id="podiumOverlay" style="display:none;">
    <div class="podium-card">
      <div class="podium-title">🏆 遊戲結束！最終排名</div>
      <div id="podiumInner" class="podium-inner"></div>
      <button class="submit-btn podium-continue-btn" id="podiumContinueBtn">
        查看完整結算 <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </div>

  <!-- ══ 結算 Overlay ══ -->
  <div class="scoreboard-overlay" id="scoreboardOverlay" style="display:none;">
    <div class="scoreboard-card">
      <div class="podium-title">📊 完整結算</div>
      <div id="scoreboardWrap"></div>

      <!-- 房主明細 -->
      <div id="hostDetailSection" style="display:none; margin-top:24px;">
        <div class="host-detail-title">📋 每人每題明細（房主限定）</div>
        <div id="hostDetailWrap" class="host-detail-wrap"></div>
      </div>

      <button class="submit-btn" id="backHomeBtn" style="margin-top:24px;">
        <i class="fa-solid fa-house"></i> 回首頁
      </button>
    </div>
  </div>

  <div class="toast-qa" id="toast"></div>
  <script src="js/audio.js"></script>
  <script src="js/quiz_game.js"></script>
</body>
</html>
